services:
  # Web Service
  - type: web
    name: educ-ai
    runtime: node
    buildCommand: bun install && bunx prisma generate && bun run build
    startCommand: bunx prisma migrate deploy && bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: educ-ai-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: educ-ai-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://educ-ai.onrender.com

  # PostgreSQL Database
  - type: psql
    name: educ-ai-db
    databaseName: educ_ai
    user: educ_ai_user
